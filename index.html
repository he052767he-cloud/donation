<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>העברה מאובטחת לתרומה - חיים הקשר</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; text-align: center; background: #f4f7f6; padding-top: 15%; color: #333; }
        .container { max-width: 400px; margin: 0 auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #008080; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        .btn { display: inline-block; padding: 12px 24px; background: #008080; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h2>מערכת התרומות של חיים הקשר</h2>
        <p>מיד תועבר לדף התשלום המאובטח...</p>
        <div class="spinner"></div>
        <button onclick="submitForm()" class="btn">לחץ כאן אם לא הועברת אוטומטית</button>
    </div>

    <form id="bypassForm" action="https://www.matara.pro/nedarimplus/online/MatchPlus.aspx" method="GET" style="display:none;">
        <input type="hidden" name="Action" value="SearchGroupe">
        <input type="hidden" name="MosadId" value="4001236">
        <input type="hidden" name="mosad" value="4001236">
        <input type="hidden" name="Id" value="14">
        <input type="hidden" name="GroupeId" value="14">
        <input type="hidden" name="R" value="14">
    </form>

    <script>
        function submitForm() {
            document.getElementById('bypassForm').submit();
        }

        // שליחה אוטומטית של הטופס חצי שנייה אחרי טעינת העמוד
        setTimeout(function() {
            submitForm();
        }, 600);
    </script>

</body>
</html>
