<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>העברה מאובטחת לתרומה - חיים הקשר</title>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; background: #f9f9f9; padding-top: 10%; color: #333; }
        .spinner { width: 50px; height: 50px; border: 5px solid #eee; border-top: 5px solid #008080; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>מערכת התרומות של חיים הקשר</h2>
    <p>מיד תועבר לדף התשלום המאובטח של נדרים פלוס...</p>
    <div class="spinner"></div>

    <!-- טעינת העמוד בתוך אייפרם משלנו כדי שנוכל לבצע את הלחיצה ב-DOM -->
    <iframe id="donationFrame" src="https://www.matara.pro/nedarimplus/online/?mosad=4001236" style="width:100%; height:80vh; border:none; display:none;"></iframe>

    <script>
        var iframe = document.getElementById('donationFrame');
        iframe.onload = function() {
            // ברגע שהאתר נטען, מציגים את ה-iframe ומעלימים את הודעת הטעינה
            iframe.style.display = "block";
            document.querySelector('h2').style.display = "none";
            document.querySelector('p').style.display = "none";
            document.querySelector('.spinner').style.display = "none";

            // מחכים חצי שנייה שה-JS של נדרים פלוס יסיים לבנות את ה-DOM
            setTimeout(function() {
                try {
                    var innerDoc = iframe.contentDocument || iframe.contentWindow.document;
                    // איתור התיבה שלך והפעלת פונקציית הלחיצה המקורית של האתר!
                    var myBox = innerDoc.getElementById('Matrim14');
                    if (myBox) {
                        myBox.click(); 
                    }
                } catch (e) {
                    // הגנת אבטחה של הדפדפן (אם יש חסימת CORS על ה-Domain)
                    console.log("CORS Restriction - Redirecting directly");
                }
            }, 600);
        };
    </script>
</body>
</html>
